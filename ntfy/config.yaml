name: "ntfy"
version: "1.0.3"
slug: "ntfy"
description: "Self-hosted ntfy notification server"
url: "https://docs.ntfy.sh/"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
legacy: true
ports:
  80/tcp: 8080
ports_description:
  80/tcp: "ntfy web/API port"
map:
  - type: share
    read_only: false
options:
  base_url: "http://127.0.0.1:8080"
  listen_port: 8080
schema:
  base_url: url
  upstream_base_url: "url?"
  listen_port: int
